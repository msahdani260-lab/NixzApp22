name: Build_APK_Otomatis
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Beri Izin Masak
        run: chmod +x gradlew
      - name: Proses Masak APK
        run: ./gradlew assembleDebug
      - name: Ambil Hasil Masakan
        uses: actions/upload-artifact@v3
        with:
          name: Aplikasi-Jadi-Install-Gue
          path: app/build/outputs/apk/debug/app-debug.apk
          
